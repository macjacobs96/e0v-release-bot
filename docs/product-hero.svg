<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafbff"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="arrow2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#a855f7" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow3" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#10b981" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bg)" rx="0"/>
  
  <!-- Subtle decorative circles -->
  <circle cx="80" cy="420" r="120" fill="#6366f1" opacity="0.03"/>
  <circle cx="920" cy="80" r="100" fill="#a855f7" opacity="0.03"/>
  <circle cx="500" cy="420" r="80" fill="#10b981" opacity="0.03"/>

  <!-- Title -->
  <text x="500" y="55" text-anchor="middle" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="28" font-weight="900" fill="#1e293b" letter-spacing="-1">E0V 版本释放 · 群聊协作，一键发版</text>
  <text x="500" y="78" text-anchor="middle" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="14" fill="#94a3b8">@机器人在群里丢链接 → 预览 → 发送，3 步完成版本释放</text>

  <!-- ═══ STEP 1 ═══ -->
  <g transform="translate(45, 110)">
    <!-- Card background -->
    <rect x="0" y="0" width="270" height="300" rx="20" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="270" height="4" rx="2" fill="url(#g1)"/>
    
    <!-- Step number -->
    <circle cx="30" cy="32" r="18" fill="url(#g1)"/>
    <text x="30" y="38" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="900" fill="#fff">1</text>
    <text x="58" y="38" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#1e293b">群里丢链接</text>
    
    <!-- Chat mockup -->
    <rect x="28" y="62" width="214" height="210" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Chat messages -->
    <!-- Message 1 -->
    <rect x="40" y="78" width="98" height="32" rx="12" fill="#e0e7ff"/>
    <text x="50" y="94" font-family="-apple-system, sans-serif" font-size="10" fill="#4338ca">@机器人 SDK MR:</text>
    <text x="50" y="105" font-family="-apple-system, sans-serif" font-size="10" fill="#4338ca">https://...</text>
    
    <!-- Message 2 -->
    <rect x="148" y="122" width="82" height="18" rx="10" fill="#e8f5e9"/>
    <text x="157" y="135" font-family="-apple-system, sans-serif" font-size="9" fill="#2e7d32">APK Build: https://...</text>

    <!-- Message 3 - file -->
    <rect x="40" y="155" width="155" height="28" rx="12" fill="#fff3e0"/>
    <text x="50" y="170" font-family="-apple-system, sans-serif" font-size="10" fill="#e65100">📎 ReleaseNote.pdf</text>
    <text x="50" y="180" font-family="-apple-system, sans-serif" font-size="9" fill="#bf360c">3.2 MB</text>

    <!-- Message 4 -->
    <rect x="40" y="196" width="112" height="18" rx="10" fill="#e0e7ff"/>
    <text x="50" y="209" font-family="-apple-system, sans-serif" font-size="9" fill="#4338ca">健康检测 Build: https://...</text>
    
    <!-- Bot reply -->
    <rect x="148" y="226" width="82" height="32" rx="10" fill="#f1f5f9"/>
    <text x="157" y="241" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b">✅ 已记录 SDK</text>
    <text x="157" y="253" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b">📋 SDK✅ APK⬜ ...</text>

    <!-- Labels -->
    <text x="135" y="300" text-anchor="middle" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#64748b">多人并行提交 · 文件拖拽上传</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(325, 240)">
    <path d="M0,20 Q35,20 70,0" fill="none" stroke="url(#arrow1)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="62,-8 76,0 62,8" fill="#c084fc"/>
  </g>

  <!-- ═══ STEP 2 ═══ -->
  <g transform="translate(392, 110)">
    <rect x="0" y="0" width="270" height="300" rx="20" fill="#ffffff" filter="url(#shadow2)"/>
    <rect x="0" y="0" width="270" height="4" rx="2" fill="url(#g2)"/>
    
    <circle cx="30" cy="32" r="18" fill="url(#g2)"/>
    <text x="30" y="38" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="900" fill="#fff">2</text>
    <text x="58" y="38" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#1e293b">预览确认</text>
    
    <!-- Preview panel -->
    <rect x="28" y="65" width="214" height="208" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Email icon and title -->
    <text x="135" y="90" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="30">📧</text>
    <text x="135" y="115" text-anchor="middle" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="700" fill="#1e293b">版本释放邮件预览</text>
    <line x1="50" y1="124" x2="220" y2="124" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Checklist -->
    <circle cx="55" cy="147" r="8" fill="#10b981" opacity="0.2"/>
    <text x="55" y="151" text-anchor="middle" font-size="10" fill="#10b981">✓</text>
    <text x="70" y="151" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#334155">SDK · MR + Build</text>
    
    <circle cx="55" cy="173" r="8" fill="#10b981" opacity="0.2"/>
    <text x="55" y="177" text-anchor="middle" font-size="10" fill="#10b981">✓</text>
    <text x="70" y="177" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#334155">健康检测 · MR + Build</text>
    
    <circle cx="55" cy="199" r="8" fill="#e2e8f0"/>
    <text x="55" y="203" text-anchor="middle" font-size="9" fill="#94a3b8">—</text>
    <text x="70" y="203" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#94a3b8">APK · 本次不发</text>
    
    <circle cx="55" cy="225" r="8" fill="#10b981" opacity="0.2"/>
    <text x="55" y="229" text-anchor="middle" font-size="10" fill="#10b981">✓</text>
    <text x="70" y="229" font-family="-apple-system, sans-serif" font-size="11" fill="#334155">📎 ReleaseNote.pdf</text>

    <!-- Recipients -->
    <text x="50" y="258" font-family="-apple-system, sans-serif" font-size="10" fill="#94a3b8">📧 收件人: sunaoyu</text>
    <text x="50" y="269" font-family="-apple-system, sans-serif" font-size="10" fill="#94a3b8">   @senseauto.com</text>
    
    <text x="135" y="300" text-anchor="middle" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#64748b">收件人可增删 · 缺啥看得见</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(672, 240)">
    <path d="M0,20 Q35,20 70,0" fill="none" stroke="url(#arrow2)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="62,-8 76,0 62,8" fill="#34d399"/>
  </g>

  <!-- ═══ STEP 3 ═══ -->
  <g transform="translate(740, 110)">
    <rect x="0" y="0" width="215" height="300" rx="20" fill="#ffffff" filter="url(#shadow3)"/>
    <rect x="0" y="0" width="215" height="4" rx="2" fill="url(#g3)"/>
    
    <circle cx="30" cy="32" r="18" fill="url(#g3)"/>
    <text x="30" y="38" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="900" fill="#fff">3</text>
    <text x="58" y="38" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#1e293b">发送</text>
    
    <rect x="28" y="65" width="159" height="208" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Success state -->
    <text x="107" y="100" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="42">✅</text>
    <text x="107" y="130" text-anchor="middle" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="14" font-weight="700" fill="#059669">邮件已发送</text>
    
    <line x1="45" y1="142" x2="170" y2="142" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Mini email -->
    <rect x="45" y="155" width="125" height="80" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.5"/>
    <text x="107" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">E0V 版本释放通知</text>
    <text x="55" y="192" font-size="8" fill="#64748b">SDK ✅  APK —</text>
    <text x="55" y="205" font-size="8" fill="#64748b">健康检测 ✅  RN ✅</text>
    <text x="107" y="225" text-anchor="middle" font-size="7" fill="#94a3b8">此邮件由机器人自动生成</text>

    <!-- Reset hint -->
    <text x="107" y="258" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#10b981">🔄 状态已清空 · 随时再来</text>
  </g>

  <!-- Decor -->
  <circle cx="320" cy="260" r="2" fill="#cbd5e1"/>
  <circle cx="340" cy="248" r="1.5" fill="#cbd5e1"/>
  <circle cx="315" cy="275" r="1" fill="#cbd5e1"/>
  
  <circle cx="667" cy="262" r="2" fill="#cbd5e1"/>
  <circle cx="687" cy="250" r="1.5" fill="#cbd5e1"/>
  <circle cx="662" cy="278" r="1" fill="#cbd5e1"/>
</svg>